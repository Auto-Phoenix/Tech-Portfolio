<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>African Liturgical Songs</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
header{background:#1f4d3a;color:white;padding:20px;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
input[type=text]{width:100%;padding:12px;margin-bottom:20px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}
label{font-weight:bold;display:block;margin-top:10px}
textarea,input,select{width:100%;padding:10px;box-sizing:border-box}
button{margin-top:15px;padding:10px 15px;cursor:pointer}
.song{border-top:1px solid #ddd;padding-top:10px;margin-top:10px}
</style>
</head>
<body>
<header>
<h1>African Liturgical Songs</h1>
<p>Digital Library for Choirs</p>
</header>

<div class="container">
<input type="text" id="search" placeholder="Search songs...">

<div class="card">
<h2>Add a Song</h2>

<label>Title</label>
<input id="title" type="text">

<label>Category</label>
<select id="category">
<option>Entrance</option>
<option>Kyrie</option>
<option>Gloria</option>
<option>Psalm</option>
<option>Gospel Acclamation</option>
<option>Offertory</option>
<option>Sanctus</option>
<option>Agnus Dei</option>
<option>Communion</option>
<option>Recessional</option>
</select>

<label>Language</label>
<input id="language" type="text" placeholder="French, English, Ewondo...">

<label>Lyrics</label>
<textarea id="lyrics" rows="8"></textarea>

<button onclick="addSong()">Save Song</button>
</div>

<div class="card">
<h2>Song Library</h2>
<div id="songs"></div>
</div>
</div>

<script>
let songs = [];

function addSong(){
 const title=document.getElementById('title').value;
 const category=document.getElementById('category').value;
 const language=document.getElementById('language').value;
 const lyrics=document.getElementById('lyrics').value;

 songs.push({title,category,language,lyrics});
 renderSongs();

 document.getElementById('title').value='';
 document.getElementById('language').value='';
 document.getElementById('lyrics').value='';
}

function renderSongs(filter=''){
 const container=document.getElementById('songs');
 container.innerHTML='';

 songs.filter(song =>
 song.title.toLowerCase().includes(filter.toLowerCase()) ||
 song.category.toLowerCase().includes(filter.toLowerCase()) ||
 song.language.toLowerCase().includes(filter.toLowerCase())
 ).forEach(song=>{
   const div=document.createElement('div');
   div.className='song';
   div.innerHTML=`
   <h3>${song.title}</h3>
   <p><strong>Category:</strong> ${song.category}</p>
   <p><strong>Language:</strong> ${song.language}</p>
   <pre>${song.lyrics}</pre>`;
   container.appendChild(div);
 });
}

document.getElementById('search').addEventListener('input', e=>{
 renderSongs(e.target.value);
});
</script>
</body>
</html>
